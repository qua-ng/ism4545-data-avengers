# MediaWave Streaming — Final Project Infrastructure
# ISM 6562 - Data Avengers
#
# Full big data stack: HDFS + Spark + Kafka + Airflow + Jupyter
# Based on weekly lab configs from Weeks 8-11
#
# Usage:
#   docker compose up -d
#   Open http://localhost:8888?token=spark   for Jupyter
#   Open http://localhost:9870               for HDFS NameNode UI
#   Open http://localhost:8080               for Airflow UI (admin / admin)
#   Open http://localhost:8083               for Spark Master UI
#   Open http://localhost:8088               for Kafka UI
#
# Memory budget (~8 GB total, fits on 16 GB laptops):
#   HDFS:     namenode ~512 MB + 2 datanodes ~512 MB each = ~1.5 GB
#   Spark:    master ~512 MB + worker ~2.5 GB             = ~3 GB
#   Kafka:    zookeeper ~512 MB + broker ~1 GB             = ~1.5 GB
#   Airflow:  postgres ~256 MB + webserver + scheduler     = ~1.5 GB
#   Jupyter:  ~2 GB
#   Total:    ~8-9 GB
#
# Apple Silicon (M1/M2/M3): platform: linux/amd64 is set on all services
# so images built for x86 run via Rosetta emulation on ARM Macs.

services:

  # ===========================
  # HDFS — Data Lake Storage
  # ===========================

  namenode:
    image: tcsmith314/hadoop-namenode-python311:latest
    platform: linux/amd64
    container_name: hadoop-namenode
    hostname: namenode
    ports:
      - "9870:9870"
      - "9000:9000"
    environment:
      - CLUSTER_NAME=mediawave-cluster
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
      - CORE_CONF_hadoop_http_staticuser_user=root
      - HDFS_CONF_dfs_namenode_name_dir=file:///hadoop/dfs/name
      - HDFS_CONF_dfs_permissions_enabled=false
      - HDFS_CONF_dfs_webhdfs_enabled=true
      - HDFS_CONF_dfs_replication=2
    volumes:
      - namenode_data:/hadoop/dfs/name
      - ./data:/data
    networks:
      - mediawave-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9870"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  datanode1:
    image: tcsmith314/hadoop-datanode-python311:latest
    platform: linux/amd64
    container_name: hadoop-datanode1
    hostname: datanode1
    ports:
      - "9864:9864"
    environment:
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
      - CORE_CONF_hadoop_http_staticuser_user=root
      - HDFS_CONF_dfs_datanode_data_dir=file:///hadoop/dfs/data
      - HDFS_CONF_dfs_permissions_enabled=false
    volumes:
      - datanode1_data:/hadoop/dfs/data
    networks:
      - mediawave-network
    depends_on:
      namenode:
        condition: service_healthy

  datanode2:
    image: tcsmith314/hadoop-datanode-python311:latest
    platform: linux/amd64
    container_name: hadoop-datanode2
    hostname: datanode2
    ports:
      - "9865:9864"
    environment:
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
      - CORE_CONF_hadoop_http_staticuser_user=root
      - HDFS_CONF_dfs_datanode_data_dir=file:///hadoop/dfs/data
      - HDFS_CONF_dfs_permissions_enabled=false
    volumes:
      - datanode2_data:/hadoop/dfs/data
    networks:
      - mediawave-network
    depends_on:
      namenode:
        condition: service_healthy

  # ===========================
  # Spark — Batch + Streaming Compute
  # ===========================

  spark-master:
    build:
      context: ./docker
      dockerfile: Dockerfile.spark
    image: ism6562/spark-jovyan:3.5.0
    platform: linux/amd64
    container_name: spark-master
    hostname: spark-master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    ports:
      - "8083:8080"
      - "7077:7077"
      - "4040:4040"
    environment:
      - SPARK_MODE=master
      - SPARK_MASTER_HOST=spark-master
      - SPARK_MASTER_PORT=7077
      - SPARK_MASTER_WEBUI_PORT=8080
      - SPARK_DAEMON_MEMORY=256m
    mem_limit: 512m
    volumes:
      - ./data:/home/jovyan/data
      - ./notebooks:/home/jovyan/notebooks
    networks:
      - mediawave-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  spark-worker:
    image: ism6562/spark-jovyan:3.5.0
    platform: linux/amd64
    container_name: spark-worker
    hostname: spark-worker
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    ports:
      - "8084:8081"
    environment:
      - SPARK_MODE=worker
      - SPARK_MASTER_URL=spark://spark-master:7077
      - SPARK_WORKER_CORES=2
      - SPARK_WORKER_MEMORY=2g
      - SPARK_WORKER_WEBUI_PORT=8081
    mem_limit: 2560m
    volumes:
      - spark-worker-data:/opt/spark/work-dir
      - ./data:/home/jovyan/data
    networks:
      - mediawave-network
    depends_on:
      spark-master:
        condition: service_healthy

  # ===========================
  # Kafka — Streaming Message Bus
  # ===========================

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    platform: linux/amd64
    container_name: zookeeper
    hostname: zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      KAFKA_OPTS: "-Dzookeeper.4lw.commands.whitelist=ruok,srvr,stat,conf,mntr"
      KAFKA_HEAP_OPTS: "-Xmx384m -Xms384m"
    mem_limit: 512m
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-logs:/var/lib/zookeeper/log
    networks:
      - mediawave-network
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181 | grep imok"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    platform: linux/amd64
    container_name: kafka
    hostname: kafka
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:9092,EXTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_LOG_RETENTION_CHECK_INTERVAL_MS: 300000
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_HEAP_OPTS: "-Xmx512m -Xms512m"
    mem_limit: 1g
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - mediawave-network
    depends_on:
      zookeeper:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 > /dev/null 2>&1"]
      interval: 20s
      timeout: 15s
      retries: 10
      start_period: 40s

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    platform: linux/amd64
    container_name: kafka-ui
    hostname: kafka-ui
    ports:
      - "8088:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: mediawave
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
      DYNAMIC_CONFIG_ENABLED: "true"
    mem_limit: 512m
    networks:
      - mediawave-network
    depends_on:
      kafka:
        condition: service_healthy

  # ===========================
  # Airflow — Pipeline Orchestration
  # ===========================

  postgres:
    image: postgres:15
    platform: linux/amd64
    container_name: airflow-postgres
    hostname: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: airflow
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - mediawave-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  airflow-init:
    build:
      context: ./docker
      dockerfile: Dockerfile.airflow
    image: ism6562/airflow-spark:2.8.1
    platform: linux/amd64
    container_name: airflow-init
    user: "1000:0"
    entrypoint: /bin/bash
    command:
      - "-c"
      - "airflow db migrate && airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com || true && airflow connections add spark_default --conn-uri 'spark://spark-master:7077' || true"
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW_CONN_SPARK_DEFAULT: '{"conn_type": "spark", "host": "spark-master", "port": 7077}'
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      HOME: /home/airflow
    networks:
      - mediawave-network
    depends_on:
      postgres:
        condition: service_healthy

  airflow-webserver:
    image: ism6562/airflow-spark:2.8.1
    platform: linux/amd64
    container_name: airflow-webserver
    hostname: airflow-webserver
    user: "1000:0"
    command: airflow webserver
    ports:
      - "8080:8080"
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW_CONN_SPARK_DEFAULT: '{"conn_type": "spark", "host": "spark-master", "port": 7077}'
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "True"
      HOME: /home/airflow
    volumes:
      - ./dags:/opt/airflow/dags
      - ./data:/opt/airflow/data
      - airflow-logs:/opt/airflow/logs
    networks:
      - mediawave-network
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  airflow-scheduler:
    image: ism6562/airflow-spark:2.8.1
    platform: linux/amd64
    container_name: airflow-scheduler
    hostname: airflow-scheduler
    user: "1000:0"
    command: airflow scheduler
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW_CONN_SPARK_DEFAULT: '{"conn_type": "spark", "host": "spark-master", "port": 7077}'
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      HOME: /home/airflow
    volumes:
      - ./dags:/opt/airflow/dags
      - ./data:/opt/airflow/data
      - airflow-logs:/opt/airflow/logs
    networks:
      - mediawave-network
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

  # ===========================
  # Jupyter — Notebook Environment
  # ===========================

  jupyter:
    image: jupyter/pyspark-notebook:spark-3.5.0
    platform: linux/amd64
    container_name: mediawave-jupyter
    hostname: mediawave-jupyter
    ports:
      - "8888:8888"
    environment:
      - JUPYTER_TOKEN=spark
      - SPARK_MASTER=spark://spark-master:7077
      - PYSPARK_SUBMIT_ARGS=--packages org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.0 --master spark://spark-master:7077 pyspark-shell
      - PYSPARK_PYTHON=/opt/miniconda/bin/python3
      - PYSPARK_DRIVER_PYTHON=/opt/conda/bin/python3
      - HDFS_NAMENODE=hdfs://namenode:9000
    command: >
      bash -c "pip install pyspark kafka-python &&
               start-notebook.sh --NotebookApp.token='spark'"
    mem_limit: 3g
    volumes:
      - ./notebooks:/home/jovyan/notebooks
      - ./data:/home/jovyan/data
      - jupyter-data:/home/jovyan/work
    networks:
      - mediawave-network
    depends_on:
      namenode:
        condition: service_healthy
      kafka:
        condition: service_healthy
      spark-master:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "/etc/jupyter/docker_healthcheck.py || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s

networks:
  mediawave-network:
    driver: bridge

volumes:
  namenode_data:
  datanode1_data:
  datanode2_data:
  spark-worker-data:
  zookeeper-data:
  zookeeper-logs:
  kafka-data:
  postgres-data:
  airflow-logs:
  jupyter-data:
